<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Document shape -->
  <rect x="8" y="4" width="24" height="32" rx="2" stroke="currentColor" stroke-width="2" fill="none"/>
  <!-- Text lines -->
  <line x1="13" y1="12" x2="27" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="17" x2="24" y2="17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13" y1="22" x2="22" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Analysis scan line (accent) -->
  <line x1="6" y1="27" x2="34" y2="27" stroke="#8B1A1A" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  <!-- Check mark -->
